<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激活码领取</title>
    <script src="https://cdn.staticfile.org/Bmob-JavaScript-SDK/2.2.5/Bmob-2.2.5.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: screen; height: 100vh; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 300px; }
        h1 { font-size: 20px; margin-bottom: 20px; color: #0084ff; }
        .result { display: none; margin-bottom: 20px; padding: 15px; background: #002b55; border: 1px dashed #0084ff; border-radius: 10px; }
        #keyCode { font-family: monospace; font-size: 24px; color: #fff; }
        button { background: #0084ff; border: none; color: #fff; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        button:disabled { background: #444; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AI 插件激活领取</h1>
        <div id="result" class="result">
            <div style="font-size: 10px; color: #888;">您的激活码</div>
            <div id="keyCode">----</div>
        </div>
        <button id="mainBtn">立即领取激活码</button>
    </div>

    <script>
        // 初始化
        Bmob.initialize("a3723e1d0f8e2d614d9dc3450fdc14fd", "7f7f3fcf459c7da0fa06e6ca9b60c98c");

        document.getElementById('mainBtn').onclick = async function() {
            const btn = this;
            if (localStorage.getItem('my_key')) {
                alert('您已领过：' + localStorage.getItem('my_key'));
                return;
            }
            btn.innerText = "请求中...";
            btn.disabled = true;

            try {
                const query = Bmob.Query("ActivationKeys");
                query.equalTo("isClaimed", "==", false);
                query.limit(1);
                const res = await query.find();

                if (res.length > 0) {
                    const item = res[0];
                    const update = Bmob.Query("ActivationKeys");
                    update.set("id", item.objectId);
                    update.set("isClaimed", true);
                    await update.save();

                    document.getElementById('keyCode').innerText = item.code;
                    document.getElementById('result').style.display = 'block';
                    btn.innerText = "领取成功";
                    localStorage.setItem('my_key', item.code);
                } else {
                    alert('库存没了，请联系作者补货！');
                    btn.innerText = "已领完";
                }
            } catch (err) {
                alert("请求失败，请检查 Bmob 安全域名是否设为 *");
                btn.disabled = false;
                btn.innerText = "重试";
            }
        };
    </script>
</body>
</html>
