<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激活码领取-调试版</title>
    <script src="https://cdn.staticfile.org/Bmob-JavaScript-SDK/2.2.5/Bmob-2.2.5.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">
    <div class="p-8 bg-gray-900 rounded-3xl border border-gray-800 text-center max-w-sm w-full">
        <h1 class="text-xl font-bold mb-6 italic">AI 插件激活码领取</h1>
        <div id="resultBox" class="hidden mb-6 p-4 bg-blue-900/20 border border-blue-500 rounded-xl">
            <span id="keyCode" class="text-xl font-mono text-blue-400">----</span>
        </div>
        <button id="mainBtn" class="w-full bg-blue-600 py-4 rounded-xl font-bold">点击领取</button>
        <p id="statusText" class="mt-4 text-xs text-gray-500"></p>
    </div>

    <script>
        // 初始化检测
        try {
            Bmob.initialize("a3723e1d0f8e2d614d9dc3450fdc14fd", "7f7f3fcf459c7da0fa06e6ca9b60c98c");
            console.log("Bmob 初始化成功");
        } catch(e) {
            alert("SDK 初始化失败，请检查网络！");
        }

        document.getElementById('mainBtn').addEventListener('click', async function() {
            const btn = this;
            const resBox = document.getElementById('resultBox');
            const codeTxt = document.getElementById('keyCode');
            const status = document.getElementById('statusText');

            alert("1. 按钮已触发！开始连接 Bmob...");
            btn.disabled = true;

            try {
                // 1. 查询
                const query = Bmob.Query("ActivationKeys");
                query.equalTo("isClaimed", "==", false);
                query.limit(1);
                
                alert("2. 正在查询 ActivationKeys 表中未领取的码...");
                const res = await query.find();

                if (res.length > 0) {
                    const item = res[0];
                    alert("3. 找到码了：" + item.code + "。正在更新状态...");

                    // 2. 更新
                    const update = Bmob.Query("ActivationKeys");
                    update.set("id", item.objectId);
                    update.set("isClaimed", true);
                    await update.save();

                    alert("4. 状态更新成功！准备显示在页面上。");
                    codeTxt.innerText = item.code;
                    resBox.classList.remove('hidden');
                    btn.innerText = "领取成功";
                    localStorage.setItem('claimed_key', item.code);
                } else {
                    alert("结果：没找到可领取的码。请检查 Bmob 表里是否有数据，且 isClaimed 是否为 false。");
                    btn.disabled = false;
                }
            } catch (err) {
                // 这里是抓错的关键！
                console.error(err);
                alert("报错了！\n错误码：" + err.code + "\n信息：" + err.error + "\n\n排查建议：\n1. 检查 Bmob 安全域名是否设为 *\n2. 检查表名 ActivationKeys 是否拼对\n3. 检查字段 isClaimed 类型是否为 Boolean");
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
